# SearXNG limiter config for local sidecar use.
# Minimal valid schema — only whitelists local IPs.
# The startup script patches get_real_ip() to fall back to remote_addr
# so 127.0.0.1 is actually detectable and matched against pass_ip.

[botdetection.ip_lists]
pass_ip = ["127.0.0.1/32", "::1/128"]
block_ip = []
